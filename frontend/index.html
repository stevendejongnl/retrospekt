<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥓</text></svg>">
  <title>Retrospekt</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #ffffff;
    }

    [data-theme='dark'] body, body[data-theme='dark'] {
      background: #161410;
    }

    @keyframes drift-0 {
      0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
      100% { transform: translate(-50%, -50%) translate(60px, 40px) scale(1.15); }
    }
    @keyframes drift-1 {
      0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1.1); }
      100% { transform: translate(-50%, -50%) translate(-50px, -30px) scale(0.95); }
    }
    @keyframes drift-2 {
      0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
      100% { transform: translate(-50%, -50%) translate(40px, -50px) scale(1.1); }
    }

    #app {
      min-height: 100vh;
    }

    :root {
      color-scheme: light;
      --retro-bg-page: #fdfcf9;
      --retro-bg-surface: #ffffff;
      --retro-bg-subtle: #f4f4f2;
      --retro-bg-hover: #fef3e8;
      --retro-text-primary: #1c1a17;
      --retro-text-secondary: #5a534b;
      --retro-text-muted: #8a8378;
      --retro-text-disabled: #b8b0a7;
      --retro-border-default: #e8e4dd;
      --retro-border-subtle: #f0ede8;
      --retro-border-strong: #ccc5bc;
      --retro-accent: #d97426;
      --retro-accent-hover: #c5651e;
      --retro-accent-tint: #fdf3e8;
      --retro-phase-collecting-bg: #dbeafe;
      --retro-phase-collecting-text: #1d4ed8;
      --retro-phase-discussing-bg: #ffedd5;
      --retro-phase-discussing-text: #c2410c;
      --retro-phase-closed-bg: #f3e8ff;
      --retro-phase-closed-text: #7e22ce;
      --retro-error: #ef4444;
      --retro-share-bg: #f0f9ff;
      --retro-share-border: #bae6fd;
      --retro-share-text: #0369a1;
      --retro-facilitator-bg: #fff8f0;
      --retro-facilitator-border: #fed7aa;
      --retro-facilitator-text: #9a6a3a;
      --retro-overlay-bg: rgba(40, 30, 20, 0.18);
      --retro-card-shadow: rgba(120, 80, 40, 0.08);

      /* Glass system */
      --retro-glass-bg-light: rgba(255, 255, 255, 0.78);
      --retro-glass-bg-medium: rgba(255, 255, 255, 0.88);
      --retro-glass-bg-strong: rgba(255, 255, 255, 0.95);
      --retro-glass-blur-light: 16px;
      --retro-glass-blur-medium: 22px;
      --retro-glass-blur-strong: 28px;
      --retro-glass-border: rgba(255, 255, 255, 0.65);
      --retro-glass-shadow: 0 8px 32px rgba(120, 80, 40, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    [data-theme='dark'] {
      color-scheme: dark;
      --retro-bg-page: #161410;
      --retro-bg-surface: #1c1b18;
      --retro-bg-subtle: #252420;
      --retro-bg-hover: #2a1f10;
      --retro-text-primary: #f0ede8;
      --retro-text-secondary: #a89f94;
      --retro-text-muted: #6b6560;
      --retro-text-disabled: #4a4540;
      --retro-border-default: #38352f;
      --retro-border-subtle: #2a2720;
      --retro-border-strong: #4a4540;
      --retro-accent: #f08746;
      --retro-accent-hover: #e07030;
      --retro-accent-tint: #2a1500;
      --retro-phase-collecting-bg: #0f1e3a;
      --retro-phase-collecting-text: #93c5fd;
      --retro-phase-discussing-bg: #2a0f00;
      --retro-phase-discussing-text: #fb923c;
      --retro-phase-closed-bg: #1a0a2e;
      --retro-phase-closed-text: #c084fc;
      --retro-error: #f87171;
      --retro-share-bg: #0a1929;
      --retro-share-border: #1e3a5f;
      --retro-share-text: #60a5fa;
      --retro-facilitator-bg: #1a0e03;
      --retro-facilitator-border: #92400e;
      --retro-facilitator-text: #d97706;
      --retro-overlay-bg: rgba(0, 0, 0, 0.5);
      --retro-card-shadow: rgba(0, 0, 0, 0.4);

      /* Glass system — dark */
      --retro-glass-bg-light: rgba(28, 27, 24, 0.45);
      --retro-glass-bg-medium: rgba(28, 27, 24, 0.62);
      --retro-glass-bg-strong: rgba(28, 27, 24, 0.78);
      --retro-glass-blur-light: 16px;
      --retro-glass-blur-medium: 22px;
      --retro-glass-blur-strong: 28px;
      --retro-glass-border: rgba(255, 255, 255, 0.08);
      --retro-glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    [data-brand='cs'] {
      --retro-accent: #2f3f5b;
      --retro-accent-hover: #51678c;
      --retro-accent-tint: #edf0f4;

      --retro-bg-page: #f2f5f7;
      --retro-bg-surface: #ffffff;
      --retro-bg-subtle: #f2f5f7;
      --retro-bg-hover: #e8ecf0;

      --retro-text-primary: #2f3f5b;
      --retro-text-secondary: #323d5b;
      --retro-text-muted: #767676;
      --retro-text-disabled: #b4b4b4;

      --retro-border-default: #e3e3e3;
      --retro-border-subtle: #f2f5f7;
      --retro-border-strong: #b4b4b4;

      --retro-phase-collecting-bg: #dbeafe;
      --retro-phase-collecting-text: #2f67cf;
      --retro-phase-discussing-bg: #fff3cd;
      --retro-phase-discussing-text: #ce4b00;
      --retro-phase-closed-bg: #d4edda;
      --retro-phase-closed-text: #178658;

      --retro-error: #c81a47;

      --retro-share-bg: #edf0f4;
      --retro-share-border: #b4b4b4;
      --retro-share-text: #2f3f5b;

      --retro-facilitator-bg: #edf0f4;
      --retro-facilitator-border: #b4b4b4;
      --retro-facilitator-text: #2f3f5b;

      --retro-overlay-bg: rgba(0, 0, 0, 0.4);
      --retro-card-shadow: rgba(47, 63, 91, 0.12);
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script src="/env.js?v=1" data-cfasync="false"></script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
