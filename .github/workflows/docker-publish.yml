name: Build & Deploy
run-name: "Build & Deploy v${{ github.event.client_payload.version }}"

on:
  repository_dispatch:
    types: [release-created]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.commit_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        run: echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_ENV

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/retrospekt-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/retrospekt-backend:${{ env.VERSION }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/retrospekt-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/retrospekt-frontend:${{ env.VERSION }}

  deploy:
    name: Deploy to k8s
    runs-on: [self-hosted, k8s]
    steps:
      - name: Restart deployment
        run: |
          RESTART_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          curl -sf -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/strategic-merge-patch+json" \
            --cacert "$CA" \
            "https://kubernetes.default.svc/apis/apps/v1/namespaces/retrospekt/deployments/retrospekt-backend" \
            -d "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$RESTART_AT\"}}}}}"


      - name: Restart deployment
        run: |
          RESTART_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          curl -sf -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/strategic-merge-patch+json" \
            --cacert "$CA" \
            "https://kubernetes.default.svc/apis/apps/v1/namespaces/retrospekt/deployments/retrospekt-frontend" \
            -d "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$RESTART_AT\"}}}}}"
